name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  UM_HOST: https://updatemachine.com

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.meta.outputs.slug }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify committed um-updater
        shell: bash
        run: |
          set -euo pipefail
          FILE="includes/um-updater.php"
          EXPECTED_SHA256="fc1808394612c3b31b9acfcda9879f808afb3e7716282f8ed59baa508d8483a2"
          if [ ! -s "$FILE" ]; then
            echo "::error::$FILE is missing or empty"
            exit 1
          fi
          if ! head -n 1 "$FILE" | grep -q "^<?php"; then
            echo "::error::$FILE is not a valid PHP file"
            exit 1
          fi
          ACTUAL_SHA256="$(sha256sum "$FILE" | awk '{print $1}')"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error::$FILE does not match um-updater v4.4.3"
            exit 1
          fi
          echo "um-updater v4.4.3 verified"

      - name: Determine plugin metadata
        id: meta
        shell: bash
        run: |
          SLUG=""
          REPO_SLUG="$(basename "$GITHUB_REPOSITORY")"
          if [ -f "${REPO_SLUG}.php" ]; then
            SLUG="$REPO_SLUG"
          else
            PLUGIN_FILE=$(find . -maxdepth 1 -name "*.php" -type f ! -name "uninstall.php" ! -name "render.php" | head -1)
            if [ -n "$PLUGIN_FILE" ]; then
              SLUG=$(basename "$PLUGIN_FILE" .php)
            else
              SLUG="$REPO_SLUG"
            fi
          fi

          if [[ "$GITHUB_REF" =~ refs/tags/v(.+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="dev"
          fi

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate plugin structure
        shell: bash
        run: bash scripts/validate-plugin-package.sh

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend assets
        if: hashFiles('package.json') != ''
        run: |
          npm ci
          npm run build:prod 2>/dev/null || npm run build 2>/dev/null || npm run prod 2>/dev/null || echo "No build script, skipping"

      - name: Build release ZIP
        shell: bash
        run: bash scripts/build-plugin-zip.sh
        env:
          PLUGIN_SLUG: ${{ steps.meta.outputs.slug }}
          PLUGIN_VERSION: ${{ steps.meta.outputs.version }}

      - name: Validate release package
        shell: bash
        run: bash scripts/validate-plugin-package.sh --zip "release/${{ steps.meta.outputs.slug }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.slug }}-${{ steps.meta.outputs.version }}.zip
          path: release/${{ steps.meta.outputs.slug }}.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.slug }} v${{ steps.meta.outputs.version }}
          files: release/${{ steps.meta.outputs.slug }}.zip
          generate_release_notes: true
          make_latest: true

  publish-update-machine:
    name: Publish to Update Machine
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download release ZIP
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.release.outputs.slug }}-${{ needs.release.outputs.version }}.zip
          path: /tmp/release

      - name: Rename ZIP with version
        run: |
          SLUG="${{ needs.release.outputs.slug }}"
          VERSION="${{ needs.release.outputs.version }}"
          mv "/tmp/release/${SLUG}.zip" "/tmp/release/${SLUG}-${VERSION}.zip"

      - name: Extract plugin metadata from PHP header
        id: php_meta
        run: |
          SLUG="${{ needs.release.outputs.slug }}"
          MAIN_FILE="${SLUG}.php"

          NAME=$(grep -m1 'Plugin Name:' "$MAIN_FILE" | sed 's/.*Plugin Name:\s*//' | sed 's/\s*\*\///' | xargs)
          DESC=$(grep -m1 'Description:' "$MAIN_FILE" | sed 's/.*Description:\s*//' | sed 's/\s*\*\///' | xargs)
          REQUIRES=$(grep -m1 'Requires at least:' "$MAIN_FILE" | sed 's/.*Requires at least:\s*//' | sed 's/\s*\*\///' | xargs || echo "6.4")
          REQUIRES_PHP=$(grep -m1 'Requires PHP:' "$MAIN_FILE" | sed 's/.*Requires PHP:\s*//' | sed 's/\s*\*\///' | xargs || echo "8.1")
          TESTED=$(grep -m1 'Tested up to:' "$MAIN_FILE" | sed 's/.*Tested up to:\s*//' | sed 's/\s*\*\///' | xargs || echo "6.9")

          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"
          echo "requires=${REQUIRES}" >> "$GITHUB_OUTPUT"
          echo "requires_php=${REQUIRES_PHP}" >> "$GITHUB_OUTPUT"
          echo "tested=${TESTED}" >> "$GITHUB_OUTPUT"

      - name: Publish to Update Machine
        run: |
          SLUG="${{ needs.release.outputs.slug }}"
          VERSION="${{ needs.release.outputs.version }}"
          ZIP="/tmp/release/${SLUG}-${VERSION}.zip"
          SHA256="$(sha256sum "$ZIP" | awk '{print $1}')"

          if [ -z "$SHA256" ]; then
            echo "::error::Could not compute sha256 for ${ZIP}"
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o /tmp/um-response.json -w "%{http_code}" \
            -X POST "${UM_HOST}/api/admin/plugins" \
            -H "Authorization: Bearer ${UM_ADMIN_TOKEN}" \
            -F "slug=${SLUG}" \
            -F "name=${{ steps.php_meta.outputs.name }}" \
            -F "version=${VERSION}" \
            -F "requires=${{ steps.php_meta.outputs.requires }}" \
            -F "requires_php=${{ steps.php_meta.outputs.requires_php }}" \
            -F "tested=${{ steps.php_meta.outputs.tested }}" \
            -F "description=${{ steps.php_meta.outputs.description }}" \
            -F "changelog=See GitHub releases for full changelog." \
            -F "sha256=${SHA256}" \
            -F "file=@${ZIP}")

          echo "HTTP Status: ${HTTP_STATUS}"
          cat /tmp/um-response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Update Machine upload failed with status ${HTTP_STATUS}"
            exit 1
          fi

          echo "✅ Published ${SLUG} v${VERSION} to Update Machine"
        env:
          UM_ADMIN_TOKEN: ${{ secrets.UM_ADMIN_TOKEN }}
